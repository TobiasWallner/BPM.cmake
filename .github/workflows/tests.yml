name: Tests

on:
  push:
  pull_request:

jobs:
  make-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make git cmake build-essential

      - name: Show tool versions
        run: |
          git --version
          cmake --version
          make --version
          
      - name: Run tests/Makefile:test
        run: make -C tests test